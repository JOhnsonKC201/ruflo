  overscroll-behavior: none;
  touch-action: manipulation;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

:root {
  --bg: #0e0f12;
  --bg-elev: #1a1c22;
  --bg-elev-2: #25282f;
  --fg: #f0f0f3;
  --fg-dim: #9aa0aa;
  --accent: #ffb74d;
  --accent-2: #4dd0e1;
  --danger: #ef5350;
  --ok: #66bb6a;
  --border: #2a2d35;
  --shadow: 0 4px 12px rgba(0,0,0,0.4);
  --radius: 10px;
  --tap: 44px;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #fafafa;
    --bg-elev: #ffffff;
    --bg-elev-2: #f0f0f3;
    --fg: #1a1a1c;
    --fg-dim: #6b7280;
    --border: #e4e4e8;
    --shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
}

button, input, select, textarea {
  font: inherit;
  color: inherit;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  min-height: var(--tap);
}

button { cursor: pointer; user-select: none; }
button:active { transform: scale(0.97); }
button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
button.ghost { background: transparent; border-color: transparent; color: var(--fg-dim); }
button.danger { background: var(--danger); color: #fff; border-color: var(--danger); }

input, textarea {
  width: 100%;
  -webkit-appearance: none;
}

textarea { font-family: ui-monospace, 'SF Mono', Menlo, monospace; resize: vertical; min-height: 200px; }

input[type="range"] {
  -webkit-appearance: none;
  background: transparent;
  padding: 0;
  border: none;
  min-height: auto;
  height: 32px;
  width: 100%;
}
input[type="range"]::-webkit-slider-runnable-track {
  background: var(--bg-elev-2);
  height: 6px;
  border-radius: 3px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: -9px;
  border: none;
}

h1, h2, h3 { margin: 0 0 8px 0; }
h1 { font-size: 22px; }
h2 { font-size: 18px; }
a { color: var(--accent-2); }

.hidden { display: none !important; }

/* Screen layouts + chord cards + controls. */

#app {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  min-height: 56px;
}
.topbar h1 { flex: 1; font-size: 17px; margin: 0; }
.topbar button { min-height: 40px; padding: 6px 10px; }

.tabbar {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--bg-elev);
}
.tabbar button {
  flex: 1;
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 10px 4px 14px;
  color: var(--fg-dim);
  font-size: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-height: 56px;
}
.tabbar button.active { color: var(--accent); }
.tabbar .icon { font-size: 20px; line-height: 1; }

.screen {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
}
.screen.active { display: block; }

/* Song list */
.song-list { padding: 8px; }
.song-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
  background: var(--bg-elev);
  border-radius: var(--radius);
  margin-bottom: 8px;
  border: 1px solid var(--border);
}
.song-card .meta { flex: 1; min-width: 0; }
.song-card .title { font-weight: 600; font-size: 16px; }
.song-card .artist { font-size: 13px; color: var(--fg-dim); }
.song-card .fav { font-size: 20px; color: var(--fg-dim); padding: 4px 8px; background: transparent; border: none; min-height: auto; }
.song-card .fav.on { color: var(--accent); }

.search-bar { padding: 8px 12px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--fg-dim); }

/* Player */
.player-controls {
  padding: 8px 12px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.player-controls .row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.player-controls .row > * { flex-shrink: 0; }
.player-controls .row .grow { flex: 1; min-width: 100px; }
.player-controls label { font-size: 12px; color: var(--fg-dim); }
.player-controls .value { font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }

.chord-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 12px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  scroll-snap-type: x mandatory;
}
.chord-card {
  flex-shrink: 0;
  background: var(--bg-elev-2);
  padding: 4px;
  border-radius: 6px;
  scroll-snap-align: start;
  width: 84px;
  min-width: 84px;
}
.chord-card.highlight { box-shadow: 0 0 0 2px var(--accent); }
.chord-diagram { width: 100%; height: 100px; }
.chord-diagram .chord-name { fill: var(--fg); font-size: 11px; font-weight: 600; }
.chord-diagram .chord-fret { stroke: var(--fg-dim); stroke-width: 0.5; }
.chord-diagram .chord-string { stroke: var(--fg-dim); stroke-width: 0.5; }
.chord-diagram .chord-nut { stroke: var(--fg); stroke-width: 2; }
.chord-diagram .chord-dot { fill: var(--accent); }
.chord-diagram .chord-mark { fill: var(--fg-dim); font-size: 10px; }
.chord-diagram .chord-open { fill: none; stroke: var(--fg); stroke-width: 0.8; }
.chord-diagram .chord-fret-label { fill: var(--fg-dim); font-size: 8px; }
.chord-diagram .chord-unknown { fill: var(--fg-dim); font-size: 24px; }

.lyrics {
  padding: 16px 16px 60vh 16px;
  font-size: 17px;
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  line-height: 1.9;
  user-select: none;
  -webkit-user-select: none;
}
.lyrics .lyric-line { position: relative; padding: 12px 0 4px 0; min-height: 32px; }
.lyrics .lyric-line .chords-track { position: absolute; top: 0; left: 0; right: 0; height: 18px; font-weight: 700; color: var(--accent); pointer-events: none; }
.lyrics .lyric-line .chord-marker { position: absolute; font-size: 14px; }
.lyrics .lyric-line .text-track { white-space: pre-wrap; word-break: break-word; }
.lyrics .blank { height: 12px; }
.lyrics .comment { color: var(--fg-dim); font-style: italic; padding: 4px 0; font-size: 14px; }
.lyrics .section-label {
  color: var(--accent-2);
  font-weight: 600;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 1px;
  padding: 16px 0 4px 0;
}
.lyrics .lyric-line.loop-marker { background: rgba(255, 183, 77, 0.08); }
.lyrics .lyric-line.loop-a::before {
  content: 'A'; position: absolute; left: -16px; color: var(--accent); font-weight: 700;
}
.lyrics .lyric-line.loop-b::before {
  content: 'B'; position: absolute; left: -16px; color: var(--accent); font-weight: 700;
}

/* Tuner */
.tuner {
  padding: 20px;
  text-align: center;
}
.tuner .note {
  font-size: 96px;
  font-weight: 300;
  margin: 20px 0;
  font-variant-numeric: tabular-nums;
}
.tuner .octave { font-size: 24px; color: var(--fg-dim); vertical-align: super; }
.tuner .cents-bar {
  position: relative;
  height: 40px;
  background: var(--bg-elev);
  border-radius: 20px;
  margin: 20px 0;
  overflow: hidden;
}
.tuner .cents-bar .center-line {
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 2px; background: var(--fg-dim);
}
.tuner .cents-bar .indicator {
  position: absolute;
  top: 4px; bottom: 4px;
  width: 6px;
  background: var(--accent);
  border-radius: 3px;
  transition: left 0.1s ease-out, background 0.1s;
}
.tuner .cents-bar .indicator.in-tune { background: var(--ok); }
.tuner .cents-label { color: var(--fg-dim); font-size: 14px; font-variant-numeric: tabular-nums; }

.string-buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 20px;
}
.string-buttons button { padding: 16px; font-size: 18px; }

/* Metronome */
.metronome { padding: 20px; text-align: center; }
.metronome .bpm-display { font-size: 84px; font-weight: 300; font-variant-numeric: tabular-nums; }
.metronome .beats {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin: 24px 0;
}
.metronome .beat {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-elev);
  border: 2px solid var(--border);
  transition: background 0.1s, transform 0.1s;
}
.metronome .beat.active { background: var(--accent); transform: scale(1.2); }
.metronome .beat.downbeat { border-color: var(--accent); }
.metronome .controls { display: flex; flex-direction: column; gap: 12px; max-width: 360px; margin: 0 auto; }
.metronome .row { display: flex; gap: 8px; align-items: center; }
.metronome .row label { min-width: 80px; text-align: left; color: var(--fg-dim); font-size: 13px; }

/* Edit */
.edit-form { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.edit-form label { font-size: 13px; color: var(--fg-dim); }
.edit-form .help { font-size: 12px; color: var(--fg-dim); padding: 8px; background: var(--bg-elev); border-radius: var(--radius); }
.edit-form .help code { background: var(--bg-elev-2); padding: 1px 4px; border-radius: 3px; }
.edit-form .actions { display: flex; gap: 8px; padding-top: 8px; }
.edit-form .actions button { flex: 1; }

/* Settings */
.settings { padding: 12px; display: flex; flex-direction: column; gap: 16px; }
.settings .group { background: var(--bg-elev); border-radius: var(--radius); padding: 12px; border: 1px solid var(--border); }
.settings .group h3 { font-size: 14px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 1px; }
.settings .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }

  </style>
</head>

  <script>

    (function() {
      const files = {"src/store.js":"// Tiny Proxy-based reactive store. Subscribe to keys, get notified on change.\n\n/**\n * @template T\n * @param {T} initial\n */\nexport function createStore(initial) {\n  const subs = new Map(); // key → Set<callback>\n  const allSubs = new Set();\n\n  const notify = (key) => {\n    const set = subs.get(key);\n    if (set) for (const cb of set) cb(state[key], key);\n    for (const cb of allSubs) cb(state[key], key);\n  };\n\n  const state = new Proxy({ ...initial }, {\n    set(target, key, value) {\n      if (target[key] !== value) {\n        target[key] = value;\n        notify(key);\n      }\n      return true;\n    },\n  });\n\n  return {\n    state,\n    subscribe(key, cb) {\n      if (typeof key === 'function') { allSubs.add(key); return () => allSubs.delete(key); }\n      if (!subs.has(key)) subs.set(key, new Set());\n      subs.get(key).add(cb);\n      return () => subs.get(key).delete(cb);\n    },\n    update(patch) { for (const k of Object.keys(patch)) state[k] = patch[k]; },\n  };\n}\n","src/db.js":"// IndexedDB wrapper for songs + settings, with localStorage fallback for older Safari.\n\nconst DB_NAME = 'guitar-practice';\nconst DB_VERSION = 1;\nconst STORE_SONGS = 'songs';\nconst STORE_SETTINGS = 'settings';\n\nlet dbPromise = null;\n\nfunction openDB() {\n  if (dbPromise) return dbPromise;\n  if (typeof indexedDB === 'undefined') return Promise.reject(new Error('no-indexeddb'));\n\n  dbPromise = new Promise((resolve, reject) => {\n    const req = indexedDB.open(DB_NAME, DB_VERSION);\n    req.onupgradeneeded = () => {\n      const db = req.result;\n      if (!db.objectStoreNames.contains(STORE_SONGS)) {\n        db.createObjectStore(STORE_SONGS, { keyPath: 'id' });\n      }\n      if (!db.objectStoreNames.contains(STORE_SETTINGS)) {\n        db.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });\n      }\n    };\n    req.onsuccess = () => resolve(req.result);\n    req.onerror = () => reject(req.error);\n  });\n  return dbPromise;\n}\n\nfunction tx(store, mode = 'readonly') {\n  return openDB().then(db => db.transaction(store, mode).objectStore(store));\n}\n\nfunction lsKey(store, id) { return `gp:${store}:${id}`; }\n\n// --- Songs ---\n\n/**\n * @typedef {{id: string, title: string, artist: string, source: string, favorite: boolean, updated: number}} SongRecord\n */\n\nexport async function saveSong(song) {\n  song.updated = Date.now();\n  try {\n    const store = await tx(STORE_SONGS, 'readwrite');\n    return new Promise((resolve, reject) => {\n      const req = store.put(song);\n      req.onsuccess = () => resolve(song);\n      req.onerror = () => reject(req.error);\n    });\n  } catch {\n    localStorage.setItem(lsKey(STORE_SONGS, song.id), JSON.stringify(song));\n    return song;\n  }\n}\n\nexport async function getSong(id) {\n  try {\n    const store = await tx(STORE_SONGS);\n    return new Promise((resolve, reject) => {\n      const req = store.get(id);\n      req.onsuccess = () => resolve(req.result || null);\n      req.onerror = () => reject(req.error);\n    });\n  } catch {\n    const raw = localStorage.getItem(lsKey(STORE_SONGS, id));\n    return raw ? JSON.parse(raw) : null;\n  }\n}\n\nexport async function getAllSongs() {\n  try {\n    const store = await tx(STORE_SONGS);\n    return new Promise((resolve, reject) => {\n      const req = store.getAll();\n      req.onsuccess = () => resolve(req.result || []);\n      req.onerror = () => reject(req.error);\n    });\n  } catch {\n    const out = [];\n    for (let i = 0; i < localStorage.length; i++) {\n      const k = localStorage.key(i);\n      if (k && k.startsWith(`gp:${STORE_SONGS}:`)) out.push(JSON.parse(localStorage.getItem(k)));\n    }\n    return out;\n  }\n}\n\nexport async function deleteSong(id) {\n  try {\n    const store = await tx(STORE_SONGS, 'readwrite');\n    return new Promise((resolve, reject) => {\n      const req = store.delete(id);\n      req.onsuccess = () => resolve();\n      req.onerror = () * \"F#m\" → [\"F#\", \"m\", null]\n * \"Bb6/9\" → [\"Bb\", \"6/9\", null]  (slash only treated as bass if followed by a note letter)\n * @param {string} chord\n * @returns {{root: string, quality: string, bass: string | null} | null}\n */\nexport function parseChord(chord) {\n  const rootMatch = chord.match(/^([A-G][#b]?)(.*)$/);\n  if (!rootMatch) return null;\n  const root = rootMatch[1];\n  let rest = rootMatch[2];\n  let bass = null;\n  const bassMatch = rest.match(/\\/([A-G][#b]?)$/);\n  if (bassMatch) {\n    bass = bassMatch[1];\n    rest = rest.slice(0, rest.length - bassMatch[0].length);\n  }\n  return { root, quality: rest, bass };\n}\n\n/**\n * Transpose a single note by N semitones.\n * @param {string} note\n * @param {number} semitones\n * @param {boolean} preferFlats\n */\nexport function transposeNote(note, semitones, preferFlats = false) {\n  const norm = normalizeRoot(note);\n  const idx = NOTES_SHARP.indexOf(norm);\n  if (idx === -1) return note;\n  const out = ((idx + semitones) % 12 + 12) % 12;\n  return preferFlats ? NOTES_FLAT[out] : NOTES_SHARP[out];\n}\n\n/**\n * Transpose a chord by N semitones.\n * @param {string} chord\n * @param {number} semitones\n * @param {boolean} preferFlats\n */\nexport function transposeChord(chord, semitones, preferFlats = false) {\n  if (semitones === 0) return chord;\n  const parsed = parseChord(chord);\n  if (!parsed) return chord;\n  const newRoot = transposeNote(parsed.root, semitones, preferFlats);\n  const newBass = parsed.bass ? transposeNote(parsed.bass, semitones, preferFlats) : null;\n  return newRoot + parsed.quality + (newBass ? '/' + newBass : '');\n}\n\n/**\n * Combine transpose + capo. Capo at fret N means chords played are -N semitones from sounded.\n * For display, \"transpose +2 capo +3\" displays chord at +2 (capo handled by the player's left hand).\n * Here we treat capo as a separate display offset that subtracts from the displayed shape.\n * Effective display semitones = transposeSemitones - capoFret.\n * @param {string} chord\n * @param {number} transposeSemitones\n * @param {number} capoFret\n */\nexport function displayChord(chord, transposeSemitones = 0, capoFret = 0) {\n  const effective = transposeSemitones - capoFret;\n  return transposeChord(chord, effective);\n}\n","src/chordpro.js":"// ChordPro parser. Handles directives like {title}, {key}, sections, and inline [chord] markers.\n// Returns a structured AST that the UI renders.\n\n/**\n * @typedef {{type: 'lyric', chords: {chord: string, pos: number}[], text: string}} LyricLine\n * @typedef {{type: 'directive', name: string, value: string}} DirectiveLine\n * @typedef {{type: 'section_start' | 'section_end', section: string}} SectionLine\n * @typedef {{type: 'comment', text: string}} CommentLine\n * @typedef {{type: 'blank'}} BlankLine\n * @typedef {LyricLine | DirectiveLine | SectionLine | CommentLine | BlankLine} Line\n * @typedef {{\n *   title: string, artist: string, key: string, capo: number, tempo: number,\n *   timeSig: string, lines: Line[], chords: string[]\n * }} Song\n */\n\nconst DIRECTIVE_ALIASES = {\n  t: 'title', st: 'subtitle', a: 'artist', su: 'subtitle',\n  c: 'comment', ci: 'comment_italic', cb: 'comment_box',\n  soc: 'start_of_chorus', eoc: 'end_of_chorus',\n  sov: 'start_of_verse', eov: 'end_of_verse',\n  sob: 'start_of_bridge', eob: 'end_of_bridge',\n};\n\n/**\n * Parse ChordPro source into a Song.\n * @param {string} src\n * @returns {Song}\n */\nexport function parseChordPro(src) {\n  const song = {\n    title: '', artist: '', key: '', capo: 0, tempo: 0, timeSig: '4/4',\n    lines: [], chords: [],\n  };\n  const chordSet = new Set();\n  const rawLines = String(src).replace(/\\r\\n?/g, '\\n').split('\\n');\n\n  for (const raw of rawLines) {\n    const line = raw.trimEnd();\n    if (line === '') { song.lines.push({ type: 'blank' }); continue; }\n\n    const directive = line.match(/^\\{([^}]+)\\}$/);\n    if (directive) {\n      const [nameRaw, ...rest] = directive[1].split(':');\n      const name = (DIRECTIVE_ALIASES[nameRaw.trim().toLowerCase()] || nameRaw.trim().toLowerCase());\n      const value = rest.join(':').trim();\n      handleDirective(song, name, value);\n      song.lines.push({ type: 'directive', name, value });\n      continue;\n    }\n\n    if (line.startsWith('#')) {\n      song.lines.push({ type: 'comment', text: line.slice(1).trim() });\n      continue;\n    }\n\n    const { text, chords } = extractInlineChords(line);\n    for (const c of chords) chordSet.add(c.chord);\n    song.lines.push({ type: 'lyric', chords, text });\n  }\n\n  song.chords = Array.from(chordSet);\n  return song;\n}\n\nfunction handleDirective(song, name, value) {\n  switch (name) {\n    case 'title': case 'subtitle': song.title = song.title || value; break;\n    case 'artist': song.artist = value; break;\n    case 'key': song.key = value; break;\n    case 'capo': song.capo = parseInt(value, 10) || 0; break;\n    case 'tempo': song.tempo = parseInt(value, 10) || 0; break;\n    case 'time': song.timeSig = value || '4/4'; break;\n    case 'start_of_chorus': song.lines.push({ type: 'section_start', section: 'chorus' }); break;\n    case 'end_of_chorus': song.lines.push({ type: 'section_end', section: 'chorus' }); break;\n    case 'start_of_verse': song.lines.push({ type: 'section_start', section: 'verse' }); break;\n    case 'end_of_verse': song.lines.push({ type: 'section_end', section: 'verse' }); break;\n    case 'start_of_bridge': song.lines.push({ type: 'section_start', section: 'bridge' }); break;\n    case 'end_of_bridge': song.lines.push({ type: 'section_end', section: 'bridge' }); break;\n  }\n}\n\n/**\n * Extract inline [chord] markers from a line of mixed chords + lyrics.\n * @param {string} line\n * @returns {{text: string, chords: {chord: string, pos: number}[]}}\n */\nexport function extractInlineChords(line) {\n  const chords = [];\n  let text = '';\n  let i = 0;\n  while (i < line.length) {\n    if (line[i] === '[') {\n      const close = line.indexOf(']', i);\n      if (close === -1) { text += line.slice(i); break; }\n      const chord = line.slice(i + 1, close).trim();\n      if (chord) chords.push({ chord, pos: text.length });\n      i = close + 1;\n    } else {\n      text += line[i++];\n    }\n  }\n  return { text, chords };\n}\n\n/**\n * Re-serialize a Song back to ChordPro text (for export).\n * @param {Song} song\n * @returns {string}\n */\nexport function serializeChordPro(song) {\n  const out = [];\n  if (song.title) out.push(`{title: ${song.title}}`);\n  if (song.artist) out.push(`{artist: ${song.artist}}`);\n  if (song.key) out.push(`{key: ${song.key}}`);\n  if (song.capo) out.push(`{capo: ${song.capo}}`);\n  if (song.tempo) out.push(`{tempo: ${song.tempo}}`);\n  if (song.timeSig && song.timeSig !== '4/4') out.push(`{time: ${song.timeSig}}`);\n  if (out.length) out.push('');\n\n  for (const line of song.lines) {\n    if (line.type === 'directive') continue; // already written from header\n    if (line.type === 'blank') { out.push(''); continue; }\n    if (line.type === 'comment') { out.push(`# ${line.text}`); continue; }\n    if (line.type === 'section_start') { out.push(`{start_of_${line.section}}`); continue; }\n    if (line.type === 'section_end') { out.push(`{end_of_${line.section}}`); continue; }\n    if (line.type === 'lyric') {\n      let s = '', cur = 0;\n      const sorted = [...line.chords].sort((a, b) => a.pos - b.pos);\n      for (const c of sorted) {\n        s += line.text.slice(cur, c.pos) + `[${c.chord}]`;\n        cur = c.pos;\n      }\n      s += line.text.slice(cur);\n      out.push(s);\n    }\n  }\n  return out.join('\\n');\n}\n","src/chords.js":"// Chord fingerings + SVG diagram renderer.\n// Fingering format: array of 6 ints (low E → high E). -1 = mute, 0 = open, >0 = fret.\n// Optional 'fingers' parallel array indicates which finger (1-4) plays each note.\n\nimport { parseChord } from 'src/transpose.js';\n\n/** @type {Record<string, {frets: number[], fingers?: number[], baseFret?: number}>} */\nexport const CHORD_LIBRARY = {\n  // Open major\n  C:    { frets: [-1, 3, 2, 0, 1, 0], fingers: [0, 3, 2, 0, 1, 0] },\n  D:    { frets: [-1, -1, 0, 2, 3, 2], fingers: [0, 0, 0, 1, 3, 2] },\n  E:    { frets: [0, 2, 2, 1, 0, 0],  fingers: [0, 2, 3, 1, 0, 0] },\n  F:    { frets: [1, 3, 3, 2, 1, 1],  fingers: [1, 3, 4, 2, 1, 1] },\n  G:    { frets: [3, 2, 0, 0, 0, 3],  fingers: [3, 2, 0, 0, 0, 4] },\n  A:    { frets: [-1, 0, 2, 2, 2, 0], fingers: [0, 0, 1, 2, 3, 0] },\n  B:    { frets: [-1, 2, 4, 4, 4, 2], fingers: [0, 1, 3, 4, 4, 1] },\n  // Open minor\n  Am:   { frets: [-1, 0, 2, 2, 1, 0], fingers: [0, 0, 2, 3, 1, 0] },\n  Dm:   { frets: [-1, -1, 0, 2, 3, 1], fingers: [0, 0, 0, 2, 3, 1] },\n  Em:   { frets: [0, 2, 2, 0, 0, 0],  fingers: [0, 2, 3, 0, 0, 0] },\n  Fm:   { frets: [1, 3, 3, 1, 1, 1],  fingers: [1, 3, 4, 1, 1, 1] },\n  Gm:   { frets: [3, 5, 5, 3, 3, 3],  fingers: [1, 3, 4, 1, 1, 1] },\n  Bm:   { frets: [-1, 2, 4, 4, 3, 2], fingers: [0, 1, 3, 4, 2, 1] },\n  Cm:   { frets: [-1, 3, 5, 5, 4, 3], fingers: [0, 1, 3, 4, 2, 1] },\n  // 7ths\n  'C7': { frets: [-1, 3, 2, 3, 1, 0], fingers: [0, 3, 2, 4, 1, 0] },\n  'D7': { frets: [-1, -1, 0, 2, 1, 2], fingers: [0, 0, 0, 2, 1, 3] },\n  'E7': { frets: [0, 2, 0, 1, 0, 0],  fingers: [0, 2, 0, 1, 0, 0] },\n  'G7': { frets: [3, 2, 0, 0, 0, 1],  fingers: [3, 2, 0, 0, 0, 1] },\n  'A7': { frets: [-1, 0, 2, 0, 2, 0], fingers: [0, 0, 2, 0, 3, 0] },\n  'B7': { frets: [-1, 2, 1, 2, 0, 2], fingers: [0, 2, 1, 3, 0, 4] },\n  'Am7':{ frets: [-1, 0, 2, 0, 1, 0], fingers: [0, 0, 2, 0, 1, 0] },\n  'Dm7':{ frets: [-1, -1, 0, 2, 1, 1], fingers: [0, 0, 0, 2, 1, 1] },\n  'Em7':{ frets: [0, 2, 2, 0, 3, 0],  fingers: [0, 1, 2, 0, 3, 0] },\n  // Maj7\n  'Cmaj7': { frets: [-1, 3, 2, 0, 0, 0], fingers: [0, 3, 2, 0, 0, 0] },\n  'Dmaj7': { frets: [-1, -1, 0, 2, 2, 2], fingers: [0, 0, 0, 1, 1, 1] },\n  'Fmaj7': { frets: [-1, -1, 3, 2, 1, 0], fingers: [0, 0, 3, 2, 1, 0] },\n  'Gmaj7': { frets: [3, 2, 0, 0, 0, 2], fingers: [3, 2, 0, 0, 0, 1] },\n  'Amaj7': { frets: [-1, 0, 2, 1, 2, 0], fingers: [0, 0, 2, 1, 3, 0] },\n  // Sus\n  'Dsus4': { frets: [-1, -1, 0, 2, 3, 3], fingers: [0, 0, 0, 1, 2, 3] },\n  'Asus4': { frets: [-1, 0, 2, 2, 3, 0], fingers: [0, 0, 1, 2, 3, 0] },\n  'Esus4': { frets: [0, 2, 2, 2, 0, 0], fingers: [0, 1, 2, 3, 0, 0] },\n  'Dsus2': { frets: [-1, -1, 0, 2, 3, 0], fingers: [0, 0, 0, 1, 2, 0] },\n  'Asus2': { frets: [-1, 0, 2, 2, 0, 0], fingers: [0, 0, 1, 2, 0, 0] },\n  // Common barre\n  'F#m':   { frets: [2, 4, 4, 2, 2, 2], fingers: [1, 3, 4, 1, 1, 1] },\n  'C#m':   { frets: [-1, 4, 6, 6, 5, 4], fingers: [0, 1, 3, 4, 2, 1] },\n  // Sharps/flats handled by lookup table below\n};\n\n// Alias flats to sharps so \"Bb\" finds \"A#\" etc.\nconst FLAT_ALIASES = { Bb: 'A#', Eb: 'D#', Ab: 'G#', Db: 'C#', Gb: 'F#' };\n\n/**\n * Look up a chord's fingering. Returns null if unknown.\n * @param {string} chord\n */\nexport function lookupChord(chord) {\n  if (CHORD_LIBRARY[chord]) return CHORD_LIBRARY[chord];\n  const parsed = parseChord(chord);\n  if (!parsed) return null;\n  const root = FLAT_ALIASES[parsed.root] || parsed.root;\n  const norm = root + parsed.quality;\n  return CHORD_LIBRARY[norm] || null;\n}\n\n/**\n * Render an SVG chord diagram. Returns an SVGElement.\n * Designed for ~80×100 px display.\n * @param {string} chordName\n * @param {{width?: number, height?: number}} [opts]\n */\nexport function renderChordSVG(chordName, opts = {}) {\n  const W = opts.width || 80;\n  const H = opts.height || 100;\n  const NS = 'http://www.w3.org/2000/svg';\n  const svg = document.createElementNS(NS, 'svg');\n  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);\n  svg.setAttribute('class', 'chord-diagram');\n  svg.setAttribute('role', 'img');\n  svg.setAttribute('aria-label', `${chordName} chord diagram`);\n\n  const fingering = lookupChord(chordName);\n\n  // Title\n  const title = document.createElementNS(NS, 'text');\n  title.setAttribute('x', W / 2);\n  title.setAttribute('y', 14);\n  title.setAttribute('text-anchor', 'middle');\n  title.setAttribute('class', 'chord-name');\n  title.textContent = chordName;\n  svg.appendChild(title);\n\n  if (!fingering) {\n    const note = document.createElementNS(NS, 'text');\n    note.setAttribute('x', W / 2);\n    note.setAttribute('y', H / 2 + 10);\n    note.setAttribute('text-anchor', 'middle');\n    note.setAttribute('class', 'chord-unknown');\n    note.textContent = '?';\n    svg.appendChild(note);\n    return svg;\n  }\n\n  // Geometry\n  const padX = 10;\n  const padTop = 22;\n  const padBot = 12;\n  const gridW = W - padX * 2;\n  const gridH = H - padTop - padBot;\n  const strings = 6;\n  const frets = 5;\n  const stringSpace = gridW / (strings - 1);\n  const fretSpace = gridH / frets;\n\n  const minFret = Math.max(...fingering.frets);\n  const baseFret = minFret > 4 ? Math.min(...fingering.frets.filter(f => f > 0)) : 1;\n  const showBase = baseFret > 1;\n\n  // Nut (thick line if base fret 1)\n  if (!showBase) {\n    const nut = document.createElementNS(NS, 'line');\n    nut.setAttribute('x1', padX); nut.setAttribute('y1', padTop);\n    nut.setAttribute('x2', padX + gridW); nut.setAttribute('y2', padTop);\n    nut.setAttribute('class', 'chord-nut');\n    svg.appendChild(nut);\n  } else {\n    const baseLabel = document.createElementNS(NS, 'text');\n    baseLabel.setAttribute('x', padX - 4);\n    baseLabel.setAttribute('y', padTop + fretSpace / 2 + 3);\n    baseLabel.setAttribute('text-anchor', 'end');\n    baseLabel.setAttribute('class', 'chord-fret-label');\n    baseLabel.textContent = baseFret + 'fr';\n    svg.appendChild(baseLabel);\n  }\n\n  // Frets (horizontal)\n  for (let f = 0; f <= frets; f++) {\n    const line = document.createElementNS(NS, 'line');\n    line.setAttribute('x1', padX); line.setAttribute('y1', padTop + f * fretSpace);\n    line.setAttribute('x2', padX + gridW); line.setAttribute('y2', padTop + f * fretSpace);\n    line.setAttribute('class', 'chord-fret');\n    svg.appendChild(line);\n  }\n\n  // Strings (vertical)\n  for (let s = 0; s < strings; s++) {\n    const line = document.createElementNS(NS, 'line');\n    line.setAttribute('x1', padX + s * stringSpace); line.setAttribute('y1', padTop);\n    line.setAttribute('x2', padX + s * stringSpace); line.setAttribute('y2', padTop + gridH);\n    line.setAttribute('class', 'chord-string');\n    svg.appendChild(line);\n  }\n\n  // Markers\n  for (let s = 0; s < strings; s++) {\n    const fret = fingering.frets[s];\n    const x = padX + s * stringSpace;\n\n    if (fret === -1) {\n      const mute = document.createElementNS(NS, 'text');\n      mute.setAttribute('x', x); mute.setAttribute('y', padTop - 5);\n      mute.setAttribute('text-anchor', 'middle'); mute.setAttribute('class', 'chord-mark');\n      mute.textContent = '×';\n      svg.appendChild(mute);\n    } else if (fret === 0) {\n      const open = document.createElementNS(NS, 'circle');\n      open.setAttribute('cx', x); open.setAttribute('cy', padTop - 6);\n      open.setAttribute('r', 2.5); open.setAttribute('class', 'chord-open');\n      svg.appendChild(open);\n    } else {\n      const displayFret = fret - baseFret + 1;\n      if (displayFret < 1 || displayFret > frets) continue;\n      const y = padTop + (displayFret - 0.5) * fretSpace;\n      const dot = document.createElementNS(NS, 'circle');\n      dot.setAttribute('cx', x); dot.setAttribute('cy', y);\n      dot.setAttribute('r', 4.5); dot.setAttribute('class', 'chord-dot');\n      svg.appendChild(dot);\n    }\n  }\n\n  return svg;\n}\n","src/scroll.js":"// Scroll engine with two modes: BPM-synced (lines per beat) and manual px/s.\n// Supports loop A/B and speed-ramp.\n\nexport class ScrollEngine {\n  constructor(scrollEl) {\n    this.el = scrollEl;\n    this.mode = 'pxps'; // 'pxps' | 'bpm'\n    this.pxPerSec = 30;\n    this.bpm = 100;\n    this.linesPerBeat = 0.5; // 2 beats per line of lyric\n    this.lineHeightPx = 32;\n    this.running = false;\n    this.rafId = null;\n    this.lastTs = 0;\n    this.loopAY = null; // pixel offset\n    this.loopBY = null;\n    this.rampCfg = null; // { startBpm, targetBpm, repsPerStep, stepSize, currentReps }\n    this.onTick = null; // (scrollTop) => void\n  }\n\n  setMode(mode) { this.mode = mode; }\n  setPxPerSec(v) { this.pxPerSec = Math.max(0, Math.min(300, v)); }\n  setBpm(v) { this.bpm = Math.max(30, Math.min(300, v)); }\n  setLineHeightPx(px) { this.lineHeightPx = px; }\n  setLinesPerBeat(n) { this.linesPerBeat = n; }\n\n  /** Tap-tempo: record taps, compute BPM from rolling average of intervals. */\n  tap() {\n    const now = performance.now();\n    if (!this._taps) this._taps = [];\n    this._taps.push(now);\n    if (this._taps.length > 6) this._taps.shift();\n    if (this._taps.length < 2) return null;\n    let sum = 0;\n    for (let i = 1; i < this._taps.length; i++) sum += this._taps[i] - this._taps[i - 1];\n    const avgMs = sum / (this._taps.length - 1);\n    if (avgMs > 2000) { this._taps = [now]; return null; }\n    const bpm = Math.round(60000 / avgMs);\n    this.setBpm(bpm);\n    return bpm;\n  }\n\n  resetTaps() { this._taps = []; }\n\n  setLoop(aY, bY) {\n    this.loopAY = aY;\n    this.loopBY = bY;\n  }\n\n  clearLoop() { this.loopAY = null; this.loopBY = null; }\n\n  setRamp(cfg) {\n    this.rampCfg = cfg ? { ...cfg, currentReps: 0 } : null;\n    if (cfg) this.setBpm(cfg.startBpm);\n  }\n\n  start() {\n    if (this.running) return;\n    this.running = true;\n    this.lastTs = performance.now();\n    this.loop();\n  }\n\n  pause() {\n    this.running = false;\n    if (this.rafId) cancelAnimationFrame(this.rafId);\n  }\n\n  toggle() {\n    if (this.running) this.pause(); else this.start();\n    return this.running;\n  }\n\n  loop() {\n    if (!this.running) return;\n    const now = performance.now();\n    const dt = (now - this.lastTs) / 1000;\n    this.lastTs = now;\n\n    const speed = this.mode === 'bpm'\n      ? this.bpm / 60 * this.linesPerBeat * this.lineHeightPx\n      : this.pxPerSec;\n\n    let nextTop = this.el.scrollTop + speed * dt;\n    const maxTop = this.el.scrollHeight - this.el.clientHeight;\n\n    if (this.loopAY != null && this.loopBY != null && nextTop >= this.loopBY) {\n      nextTop = this.loopAY;\n      if (this.rampCfg) this.handleRampLoop();\n    } else if (nextTop >= maxTop) {\n      this.pause();\n      nextTop = maxTop;\n    }\n\n    this.el.scrollTop = nextTop;\n    if (this.onTick) this.onTick(nextTop);\n    this.rafId = requestAnimationFrame(() => this.loop());\n  }\n\n  handleRampLoop() {\n    const r = this.rampCfg;\n    r.currentReps++;\n    if (r.currentReps >= r.repsPerStep) {\n      r.currentReps = 0;\n      const next = Math.min(r.targetBpm, this.bpm + r.stepSize);\n      this.setBpm(next);\n      if (next >= r.targetBpm) this.rampCfg = null;\n    }\n  }\n}\n","src/songs-seed.js":"// Starter songs. User can delete/replace these. Public-domain or original placeholders.\n\nexport const SEED_SONGS = [\n  {\n    id: 'seed-house-rising-sun',\n    title: 'House of the Rising Sun',\n    artist: 'Traditional',\n    favorite: false,\n    source: `{title: House of the Rising Sun}\n{artist: Traditional}\n{key: Am}\n{tempo: 80}\n{time: 6/8}\n\n{start_of_verse}\nThere [Am]is a [C]house in [D]New Or-[F]leans\nThey [Am]call the [C]Rising [E]Sun\nAnd it's [Am]been the [C]ruin of [D]many a poor [F]boy\nAnd [Am]God, I [E]know I'm [Am]one\n{end_of_verse}\n\n{start_of_verse}\nMy [Am]mother [C]was a [D]tailor [F]\nShe [Am]sewed my [C]new blue [E]jeans\nMy [Am]father [C]was a [D]gambling [F]man\nDown in [Am]New Or-[E]leans\n{end_of_verse}`,\n    updated: 0,\n  },\n  {\n    id: 'seed-chord-practice',\n    title: 'Chord Practice (G–D–Em–C)',\n    artist: 'Practice Loop',\n    favorite: true,\n    source: `{title: Chord Practice (G-D-Em-C)}\n{artist: Practice Loop}\n{key: G}\n{tempo: 90}\n{time: 4/4}\n\n# The four-chord loop. Loop A/B this whole section for drilling.\n\n{start_of_verse}\n[G]One two three four [D]two two three four\n[Em]three two three four [C]four two three four\n[G]One two three four [D]two two three four\n[Em]three two three four [C]four two three four\n{end_of_verse}\n\n{start_of_chorus}\n[G]Smooth transitions [D]watch your fingers\n[Em]Keep the strum [C]even and steady\n[G]Build your speed [D]gradually\n[Em]Don't rush [C]ahead\n{end_of_chorus}`,\n    updated: 0,\n  },\n];\n","src/audio/metronome.js":"// Drift-free metronome using the Chris Wilson lookahead-scheduler pattern.\n// Synthesized clicks (no audio files needed).\n\nconst LOOKAHEAD_MS = 25;\nconst SCHEDULE_AHEAD_S = 0.1;\n\nexport class Metronome {\n  constructor() {\n    this.ctx = null;\n    this.bpm = 100;\n    this.beatsPerBar = 4;\n    this.running = false;\n    this.nextNoteTime = 0;\n    this.currentBeat = 0;\n    this.timerId = null;\n    this.onBeat = null; // (beatIndex, time) => void\n  }\n\n  ensureContext() {\n    if (!this.ctx) {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      this.ctx = new AC();\n    }\n    if (this.ctx.state === 'suspended') this.ctx.resume();\n    return this.ctx;\n  }\n\n  start() {\n    if (this.running) return;\n    this.ensureContext();\n    this.running = true;\n    this.currentBeat = 0;\n    this.nextNoteTime = this.ctx.currentTime + 0.05;\n    this.tick();\n  }\n\n  stop() {\n    this.running = false;\n    if (this.timerId) clearTimeout(this.timerId);\n    this.timerId = null;\n  }\n\n  setBpm(bpm) {\n    this.bpm = Math.max(30, Math.min(300, bpm));\n  }\n\n  setBeatsPerBar(n) {\n    this.beatsPerBar = Math.max(1, Math.min(16, n));\n  }\n\n  tick() {\n    if (!this.running) return;\n    while (this.nextNoteTime < this.ctx.currentTime + SCHEDULE_AHEAD_S) {\n      const isDownbeat = this.currentBeat % this.beatsPerBar === 0;\n      this.scheduleClick(this.nextNoteTime, isDownbeat);\n      if (this.onBeat) {\n        const beatIdx = this.currentBeat % this.beatsPerBar;\n        const time = this.nextNoteTime;\n        setTimeout(() => this.onBeat && this.onBeat(beatIdx, time),\n          Math.max(0, (time - this.ctx.currentTime) * 1000));\n      }\n      this.nextNoteTime += 60.0 / this.bpm;\n      this.currentBeat++;\n    }\n    this.timerId = setTimeout(() => this.tick(), LOOKAHEAD_MS);\n  }\n\n  scheduleClick(time, accent) {\n    const osc = this.ctx.createOscillator();\n    const gain = this.ctx.createGain();\n    osc.frequency.value = accent ? 1500 : 1000;\n    osc.type = 'square';\n    gain.gain.setValueAtTime(0, time);\n    gain.gain.linearRampToValueAtTime(accent ? 0.4 : 0.2, time + 0.001);\n    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);\n    osc.connect(gain).connect(this.ctx.destination);\n    osc.start(time);\n    osc.stop(time + 0.06);\n  }\n}\n","src/audio/tuner.js":"// Pitch detection via YIN autocorrelation.\n// Returns { frequency, note, octave, cents } or null when below confidence threshold.\n\nconst NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];\nconst A4 = 440;\nconst A4_MIDI = 69;\n\n/**\n * YIN pitch detection.\n * @param {Float32Array} buffer\n * @param {number} sampleRate\n * @param {number} threshold\n * @returns {number} frequency in Hz, or -1 if no pitch detected\n */\nexport function yinDetect(buffer, sampleRate, threshold = 0.1) {\n  const N = buffer.length;\n  const halfN = Math.floor(N / 2);\n  const yinBuf = new Float32Array(halfN);\n\n  // 1. Difference function\n  for (let tau = 0; tau < halfN; tau++) {\n    let sum = 0;\n    for (let i = 0; i < halfN; i++) {\n      const delta = buffer[i] - buffer[i + tau];\n      sum += delta * delta;\n    }\n    yinBuf[tau] = sum;\n  }\n\n  // 2. Cumulative mean normalized difference\n  yinBuf[0] = 1;\n  let running = 0;\n  for (let tau = 1; tau < halfN; tau++) {\n    running += yinBuf[tau];\n    yinBuf[tau] = yinBuf[tau] * tau / running;\n  }\n\n  // 3. Absolute threshold\n  let tau = -1;\n  for (let t = 2; t < halfN; t++) {\n    if (yinBuf[t] < threshold) {\n      while (t + 1 < halfN && yinBuf[t + 1] < yinBuf[t]) t++;\n      tau = t;\n      break;\n    }\n  }\n  if (tau === -1) return -1;\n\n  // 4. Parabolic interpolation for sub-sample precision\n  let betterTau = tau;\n  if (tau > 0 && tau < halfN - 1) {\n    const s0 = yinBuf[tau - 1];\n    const s1 = yinBuf[tau];\n    const s2 = yinBuf[tau + 1];\n    betterTau = tau + (s2 - s0) / (2 * (2 * s1 - s2 - s0));\n  }\n\n  return sampleRate / betterTau;\n}\n\n/**\n * Convert a frequency to note + cents-off-from-pitch.\n * @param {number} freq\n */\nexport function freqToNote(freq) {\n  if (freq <= 0) return null;\n  const midi = 12 * Math.log2(freq / A4) + A4_MIDI;\n  const midiRound = Math.round(midi);\n  const cents = Math.round((midi - midiRound) * 100);\n  const note = NOTE_NAMES[(midiRound + 1200) % 12];\n  const octave = Math.floor(midiRound / 12) - 1;\n  return { note, octave, cents, midi: midiRound, frequency: freq };\n}\n\nexport class Tuner {\n  constructor({ onPitch, bufferSize = 2048 } = {}) {\n    this.onPitch = onPitch;\n    this.bufferSize = bufferSize;\n    this.ctx = null;\n    this.stream = null;\n    this.analyser = null;\n    this.buffer = null;\n    this.rafId = null;\n    this.running = false;\n  }\n\n  async start() {\n    if (this.running) return;\n    const AC = window.AudioContext || window.webkitAudioContext;\n    this.ctx = new AC();\n    if (this.ctx.state === 'suspended') await this.ctx.resume();\n    this.stream = await navigator.mediaDevices.getUserMedia({\n      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },\n    });\n    const source = this.ctx.createMediaStreamSource(this.stream);\n    this.analyser = this.ctx.createAnalyser();\n    this.analyser.fftSize = this.bufferSize;\n    source.connect(this.analyser);\n    this.buffer = new Float32Array(this.bufferSize);\n    this.running = true;\n    this.loop();\n  }\n\n  loop() {\n    if (!this.running) return;\n    this.analyser.getFloatTimeDomainData(this.buffer);\n    // RMS gate to skip silence\n    let rms = 0;\n    for (let i = 0; i < this.buffer.length; i++) rms += this.buffer[i] * this.buffer[i];\n    rms = Math.sqrt(rms / this.buffer.length);\n    if (rms > 0.01) {\n      const freq = yinDetect(this.buffer, this.ctx.sampleRate);\n      if (freq > 0) {\n        const note = freqToNote(freq);\n        if (note && this.onPitch) this.onPitch(note);\n      }\n    }\n    this.rafId = requestAnimationFrame(() => this.loop());\n  }\n\n  stop() {\n    this.running = false;\n    if (this.rafId) cancelAnimationFrame(this.rafId);\n    if (this.stream) this.stream.getTracks().forEach(t => t.stop());\n    if (this.ctx) this.ctx.close();\n    this.stream = null;\n    this.ctx = null;\n  }\n}\n","src/audio/reference.js":"// Reference tone playback for tuning by ear. Synthesized sine waves, no samples needed.\n\n// Standard tuning frequencies (Hz)\nexport const STRINGS = [\n  { name: 'E2', label: 'Low E', freq: 82.41 },\n  { name: 'A2', label: 'A',     freq: 110.00 },\n  { name: 'D3', label: 'D',     freq: 146.83 },\n  { name: 'G3', label: 'G',     freq: 196.00 },\n  { name: 'B3', label: 'B',     freq: 246.94 },\n  { name: 'E4', label: 'High E', freq: 329.63 },\n];\n\nlet ctx = null;\nlet currentOsc = null;\nlet currentGain = null;\n\nfunction ensureContext() {\n  if (!ctx) {\n    const AC = window.AudioContext || window.webkitAudioContext;\n    ctx = new AC();\n  }\n  if (ctx.state === 'suspended') ctx.resume();\n  return ctx;\n}\n\nexport function playTone(freq, durationS = 2) {\n  stopTone();\n  const c = ensureContext();\n  const osc = c.createOscillator();\n  const gain = c.createGain();\n  osc.frequency.value = freq;\n  osc.type = 'sine';\n  const t = c.currentTime;\n  gain.gain.setValueAtTime(0, t);\n  gain.gain.linearRampToValueAtTime(0.3, t + 0.02);\n  gain.gain.setValueAtTime(0.3, t + durationS - 0.2);\n  gain.gain.exponentialRampToValueAtTime(0.001, t + durationS);\n  osc.connect(gain).connect(c.destination);\n  osc.start(t);\n  osc.stop(t + durationS);\n  currentOsc = osc;\n  currentGain = gain;\n}\n\nexport function stopTone() {\n  if (currentOsc) {\n    try { currentOsc.stop(); } catch {}\n    currentOsc.disconnect();\n    currentOsc = null;\n  }\n  if (currentGain) { currentGain.disconnect(); currentGain = null; }\n}\n","src/ui/song-list.js":"// Song library list screen with search + favorite + delete + setlist queue.\n\nimport { getAllSongs, deleteSong, saveSong } from 'src/db.js';\n\nexport class SongListView {\n  constructor(rootEl, { onOpen, onAdd } = {}) {\n    this.root = rootEl;\n    this.onOpen = onOpen;\n    this.onAdd = onAdd;\n    this.songs = [];\n    this.filter = '';\n    this.root.innerHTML = `\n      <div class=\"search-bar\">\n        <input type=\"search\" placeholder=\"Search songs...\" class=\"search-input\" />\n      </div>\n      <div class=\"song-list\"></div>\n    `;\n    this.listEl = this.root.querySelector('.song-list');\n    this.searchEl = this.root.querySelector('.search-input');\n    this.searchEl.addEventListener('input', () => {\n      this.filter = this.searchEl.value.toLowerCase();\n      this.render();\n    });\n  }\n\n  async refresh() {\n    this.songs = await getAllSongs();\n    this.songs.sort((a, b) => {\n      if (a.favorite !== b.favorite) return a.favorite ? -1 : 1;\n      return (a.title || '').localeCompare(b.title || '');\n    });\n    this.render();\n  }\n\n  render() {\n    const filtered = this.songs.filter(s => {\n      if (!this.filter) return true;\n      return (s.title || '').toLowerCase().includes(this.filter)\n        || (s.artist || '').toLowerCase().includes(this.filter);\n    });\n\n    if (filtered.length === 0) {\n      this.listEl.innerHTML = `\n        <div class=\"empty-state\">\n          <p>${this.filter ? 'No matches.' : 'No songs yet. Tap + to add one.'}</p>\n        </div>\n      `;\n      return;\n    }\n\n    this.listEl.innerHTML = '';\n    for (const song of filtered) {\n      const card = document.createElement('div');\n      card.className = 'song-card';\n      card.innerHTML = `\n        <div class=\"meta\">\n          <div class=\"title\"></div>\n          <div class=\"artist\"></div>\n        </div>\n        <button class=\"fav ${song.favorite ? 'on' : ''}\" aria-label=\"Favorite\">★</button>\n      `;\n      card.querySelector('.title').textContent = song.title || '(Untitled)';\n      card.querySelector('.artist').textContent = song.artist || '';\n\n      card.querySelector('.meta').addEventListener('click', () => this.onOpen && this.onOpen(song.id));\n      card.querySelector('.fav').addEventListener('click', async (e) => {\n        e.stopPropagation();\n        song.favorite = !song.favorite;\n        await saveSong(song);\n        this.refresh();\n      });\n\n      // Long-press to delete\n      let pressTimer = null;\n      card.addEventListener('touchstart', (e) => {\n        pressTimer = setTimeout(async () => {\n          if (confirm(`Delete \"${song.title}\"?`)) {\n            await deleteSong(song.id);\n            this.refresh();\n          }\n        }, 800);\n      }, { passive: true });\n      card.addEventListener('touchend', () => clearTimeout(pressTimer));\n      card.addEventListener('touchmove', () => clearTimeout(pressTimer));\n\n      this.listEl.appendChild(card);\n    }\n  }\n}\n","src/ui/song-player.js":"// Song player: chord cards, scrolling lyrics with chord markers, transpose/capo, loop A/B.\n\nimport { getSong } from 'src/db.js';\nimport { parseChordPro } from 'src/chordpro.js';\nimport { displayChord } from 'src/transpose.js';\nimport { renderChordSVG } from 'src/chords.js';\nimport { ScrollEngine } from 'src/scroll.js';\nimport { Metronome } from 'src/audio/metronome.js';\n\nexport class SongPlayerView {\n  constructor(rootEl, { onBack } = {}) {\n    this.root = rootEl;\n    this.onBack = onBack;\n    this.song = null;\n    this.parsed = null;\n    this.transpose = 0;\n    this.capo = 0;\n    this.scrollMode = 'bpm';\n    this.scrollEngine = null;\n    this.metronome = new Metronome();\n    this.metronomeOn = false;\n    this.wakeLock = null;\n    this.loopA = null;\n    this.loopB = null;\n\n    this.root.innerHTML = `\n      <div class=\"player-controls\">\n        <div class=\"row\">\n          <button class=\"play-btn primary\">▶ Play</button>\n          <button class=\"met-btn ghost\" title=\"Metronome\">𝅘𝅥</button>\n          <div class=\"grow\"></div>\n          <button class=\"tap-btn ghost\">TAP</button>\n          <span class=\"bpm-display value\">100</span>\n          <label>BPM</label>\n        </div>\n        <div class=\"row\">\n          <label>Speed</label>\n          <input type=\"range\" min=\"40\" max=\"240\" value=\"100\" class=\"bpm-slider grow\" />\n        </div>\n        <div class=\"row\">\n          <label>Transpose</label>\n          <button class=\"transpose-down\">−</button>\n          <span class=\"transpose-display value\">0</span>\n          <button class=\"transpose-up\">+</button>\n          <div class=\"grow\"></div>\n          <label>Capo</label>\n          <button class=\"capo-down\">−</button>\n          <span class=\"capo-display value\">0</span>\n          <button class=\"capo-up\">+</button>\n        </div>\n        <div class=\"row\">\n          <button class=\"loop-clear ghost\">Clear A/B</button>\n          <span class=\"loop-status\" style=\"font-size:12px;color:var(--fg-dim)\"></span>\n          <div class=\"grow\"></div>\n          <button class=\"mode-toggle ghost\">Mode: BPM</button>\n        </div>\n      </div>\n      <div class=\"chord-row\"></div>\n      <div class=\"lyrics-container\" style=\"flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;\">\n        <div class=\"lyrics\"></div>\n      </div>\n    `;\n\n    this.root.style.display = 'none';\n    this.root.style.flexDirection = 'column';\n\n    this.chordRow = this.root.querySelector('.chord-row');\n    this.lyricsContainer = this.root.querySelector('.lyrics-container');\n    this.lyricsEl = this.root.querySelector('.lyrics');\n    this.bindControls();\n  }\n\n  show() { this.root.style.display = 'flex'; }\n  hide() { this.root.style.display = 'none'; this.stopAll(); }\n\n  bindControls() {\n    this.root.querySelector('.play-btn').addEventListener('click', () => this.togglePlay());\n    this.root.querySelector('.met-btn').addEventListener('click', () => this.toggleMetronome());\n    this.root.querySelector('.tap-btn').addEventListener('click', () => this.tap());\n    this.root.querySelector('.bpm-slider').addEventListener('input', (e) => {\n      const bpm = +e.target.value;\n      this.scrollEngine?.setBpm(bpm);\n      this.metronome.setBpm(bpm);\n      this.root.querySelector('.bpm-display').textContent = bpm;\n    });\n    this.root.querySelector('.transpose-up').addEventListener('click', () => this.changeTranspose(+1));\n    this.root.querySelector('.transpose-down').addEventListener('click', () => this.changeTranspose(-1));\n    this.root.querySelector('.capo-up').addEventListener('click', () => this.changeCapo(+1));\n    this.root.querySelector('.capo-down').addEventListener('click', () => this.changeCapo(-1));\n    this.root.querySelector('.loop-clear').addEventListener('click', () => this.clearLoop());\n    this.root.querySelector('.mode-toggle').addEventListener('click', () => this.toggleMode());\n  }\n\n  async load(id) {\n    this.song = await getSong(id);\n    if (!this.song) return;\n    this.parsed = parseChordPro(this.song.source);\n    if (this.parsed.tempo) {\n      this.root.querySelector('.bpm-slider').value = this.parsed.tempo;\n      this.root.querySelector('.bpm-display').textContent = this.parsed.tempo;\n    }\n    if (this.parsed.capo) {\n      this.capo = this.parsed.capo;\n      this.root.querySelector('.capo-display').textContent = this.capo;\n    }\n    this.transpose = 0;\n    this.loopA = null; this.loopB = null;\n    this.renderChords();\n    this.renderLyrics();\n    this.setupScrollEngine();\n    await this.requestWakeLock();\n  }\n\n  setupScrollEngine() {\n    this.scrollEngine = new ScrollEngine(this.lyricsContainer);\n    this.scrollEngine.setMode(this.scrollMode);\n    const bpm = parseInt(this.root.querySelector('.bpm-display').textContent, 10) || 100;\n    this.scrollEngine.setBpm(bpm);\n    this.metronome.setBpm(bpm);\n  }\n\n  renderChords() {\n    this.chordRow.innerHTML = '';\n    for (const chord of this.parsed.chords) {\n      const displayed = displayChord(chord, this.transpose, this.capo);\n      const card = document.createElement('div');\n      card.className = 'chord-card';\n      card.dataset.chord = chord;\n      const svg = renderChordSVG(displayed);\n      card.appendChild(svg);\n      this.chordRow.appendChild(card);\n    }\n  }\n\n  renderLyrics() {\n    this.lyricsEl.innerHTML = '';\n    for (const line of this.parsed.lines) {\n      if (line.type === 'blank') {\n        const el = document.createElement('div');\n        el.className = 'blank';\n        this.lyricsEl.appendChild(el);\n        continue;\n      }\n      if (line.type === 'comment') {\n        const el = document.createElement('div');\n        el.className = 'comment';\n        el.textContent = line.text;\n        this.lyricsEl.appendChild(el);\n        continue;\n      }\n      if (line.type === 'section_start') {\n        const el = document.createElement('div');\n        el.className = 'section-label';\n        el.textContent = line.section;\n        this.lyricsEl.appendChild(el);\n        continue;\n      }\n      if (line.type === 'section_end' || line.type === 'directive') continue;\n      if (line.type === 'lyric') {\n        this.lyricsEl.appendChild(this.renderLyricLine(line));\n      }\n    }\n  }\n\n  renderLyricLine(line) {\n    const el = document.createElement('div');\n    el.className = 'lyric-line';\n\n    const chordsTrack = document.createElement('div');\n    chordsTrack.className = 'chords-track';\n\n    const textTrack = document.createElement('div');\n    textTrack.className = 'text-track';\n    textTrack.textContent = line.text || ' ';\n\n    // Place chord markers proportionally based on character position\n    const len = line.text.length || 1;\n    for (const c of line.chords) {\n      const span = document.createElement('span');\n      span.className = 'chord-marker';\n      span.textContent = displayChord(c.chord, this.transpose, this.capo);\n      span.style.left = `${(c.pos / len) * 100}%`;\n      span.dataset.chord = c.chord;\n      span.addEventListener('click', () => this.highlightChord(c.chord));\n      chordsTrack.appendChild(span);\n    }\n\n    el.appendChild(chordsTrack);\n    el.appendChild(textTrack);\n\n    // Long-press to set loop A/B\n    let pressTimer = null;\n    const startPress = () => {\n      pressTimer = setTimeout(() => this.setLoopPoint(el), 600);\n    };\n    const cancelPress = () => clearTimeout(pressTimer);\n    el.addEventListener('touchstart', startPress, { passive: true });\n    el.addEventListener('touchend', cancelPress);\n    el.addEventListener('touchmove', cancelPress);\n    el.addEventListener('mousedown', startPress);\n    el.addEventListener('mouseup', cancelPress);\n    el.addEventListener('mouseleave', cancelPress);\n\n    return el;\n  }\n\n  highlightChord(chord) {\n    this.chordRow.querySelectorAll('.chord-card').forEach(c => c.classList.remove('highlight'));\n    const target = this.chordRow.querySelector(`.chord-card[data-chord=\"${chord}\"]`);\n    if (target) {\n      target.classList.add('highlight');\n      target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });\n    }\n  }\n\n  setLoopPoint(el) {\n    if (this.loopA == null) {\n      this.loopA = el.offsetTop;\n      el.classList.add('loop-marker', 'loop-a');\n      this.root.querySelector('.loop-status').textContent = 'A set, long-press for B';\n    } else if (this.loopB == null) {\n      this.loopB = el.offsetTop + el.offsetHeight;\n      el.classList.add('loop-marker', 'loop-b');\n      this.scrollEngine?.setLoop(this.loopA, this.loopB);\n      this.root.querySelector('.loop-status').textContent = 'Looping A↔B';\n    } else {\n      this.clearLoop();\n    }\n  }\n\n  clearLoop() {\n    this.loopA = null; this.loopB = null;\n    this.scrollEngine?.clearLoop();\n    this.lyricsEl.querySelectorAll('.loop-marker').forEach(el => {\n      el.classList.remove('loop-marker', 'loop-a', 'loop-b');\n    });\n    this.root.querySelector('.loop-status').textContent = '';\n  }\n\n  togglePlay() {\n    const running = this.scrollEngine?.toggle();\n    this.root.querySelector('.play-btn').textContent = running ? '❚❚ Pause' : '▶ Play';\n  }\n\n  toggleMetronome() {\n    if (this.metronomeOn) {\n      this.metronome.stop();\n      this.metronomeOn = false;\n      this.root.querySelector('.met-btn').classList.remove('primary');\n      this.root.querySelector('.met-btn').classList.add('ghost');\n    } else {\n      this.metronome.start();\n      this.metronomeOn = true;\n      this.root.querySelector('.met-btn').classList.add('primary');\n      this.root.querySelector('.met-btn').classList.remove('ghost');\n    }\n  }\n\n  tap() {\n    const bpm = this.scrollEngine?.tap();\n    if (bpm) {\n      this.root.querySelector('.bpm-display').textContent = bpm;\n      this.root.querySelector('.bpm-slider').value = bpm;\n      this.metronome.setBpm(bpm);\n    }\n  }\n\n  changeTranspose(delta) {\n    this.transpose = Math.max(-12, Math.min(12, this.transpose + delta));\n    this.root.querySelector('.transpose-display').textContent = this.transpose > 0 ? `+${this.transpose}` : this.transpose;\n    this.renderChords();\n    this.renderLyrics();\n  }\n\n  changeCapo(delta) {\n    this.capo = Math.max(0, Math.min(12, this.capo + delta));\n    this.root.querySelector('.capo-display').textContent = this.capo;\n    this.renderChords();\n    this.renderLyrics();\n  }\n\n  toggleMode() {\n    this.scrollMode = this.scrollMode === 'bpm' ? 'pxps' : 'bpm';\n    this.scrollEngine?.setMode(this.scrollMode);\n    this.root.querySelector('.mode-toggle').textContent = `Mode: ${this.scrollMode === 'bpm' ? 'BPM' : 'px/s'}`;\n  }\n\n  async requestWakeLock() {\n    if (!('wakeLock' in navigator)) return;\n    try {\n      this.wakeLock = await navigator.wakeLock.request('screen');\n    } catch (e) { /* user denied or unsupported */ }\n  }\n\n  stopAll() {\n    this.scrollEngine?.pause();\n    if (this.metronomeOn) this.toggleMetronome();\n    if (this.wakeLock) { this.wakeLock.release(); this.wakeLock = null; }\n  }\n}\n","src/ui/song-edit.js":"// Add/edit a song. Paste ChordPro, preview, save.\n\nimport { saveSong, getSong } from 'src/db.js';\nimport { parseChordPro } from 'src/chordpro.js';\n\nexport class SongEditView {\n  constructor(rootEl, { onSaved, onCancel } = {}) {\n    this.root = rootEl;\n    this.onSaved = onSaved;\n    this.onCancel = onCancel;\n    this.editingId = null;\n\n    this.root.innerHTML = `\n      <div class=\"edit-form\">\n        <div class=\"help\">\n          Paste a song in <strong>ChordPro</strong> format. Put chords in square brackets inline with lyrics:\n          <code>[Am]This is a [C]line</code>. Use <code>{title: ...}</code>, <code>{artist: ...}</code>,\n          <code>{key: ...}</code>, <code>{tempo: 120}</code>, <code>{start_of_chorus}...{end_of_chorus}</code>.\n        </div>\n        <label>Title <input class=\"title-input\" placeholder=\"Song title\" /></label>\n        <label>Artist <input class=\"artist-input\" placeholder=\"Artist\" /></label>\n        <label>ChordPro source\n          <textarea class=\"source-input\" spellcheck=\"false\" placeholder=\"{title: My Song}\n{artist: ...}\n\n[G]Verse [D]goes [Em]here[C]...\"></textarea>\n        </label>\n        <div class=\"actions\">\n          <button class=\"cancel-btn ghost\">Cancel</button>\n          <button class=\"save-btn primary\">Save</button>\n        </div>\n      </div>\n    `;\n\n    this.titleEl = this.root.querySelector('.title-input');\n    this.artistEl = this.root.querySelector('.artist-input');\n    this.sourceEl = this.root.querySelector('.source-input');\n\n    this.root.querySelector('.save-btn').addEventListener('click', () => this.save());\n    this.root.querySelector('.cancel-btn').addEventListener('click', () => this.onCancel && this.onCancel());\n\n    // Auto-fill title/artist from directives when user types in source\n    this.sourceEl.addEventListener('blur', () => {\n      const parsed = parseChordPro(this.sourceEl.value);\n      if (parsed.title && !this.titleEl.value) this.titleEl.value = parsed.title;\n      if (parsed.artist && !this.artistEl.value) this.artistEl.value = parsed.artist;\n    });\n  }\n\n  async loadForEdit(id) {\n    this.editingId = id;\n    const song = id ? await getSong(id) : null;\n    this.titleEl.value = song?.title || '';\n    this.artistEl.value = song?.artist || '';\n    this.sourceEl.value = song?.source || '';\n  }\n\n  reset(initialSource = '') {\n    this.editingId = null;\n    this.titleEl.value = '';\n    this.artistEl.value = '';\n    this.sourceEl.value = initialSource;\n  }\n\n  async save() {\n    const source = this.sourceEl.value.trim();\n    if (!source) { alert('Paste some ChordPro source first.'); return; }\n    const parsed = parseChordPro(source);\n    const title = this.titleEl.value.trim() || parsed.title || 'Untitled';\n    const artist = this.artistEl.value.trim() || parsed.artist || '';\n    const song = {\n      id: this.editingId || `song-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,\n      title, artist, source,\n      favorite: false,\n      updated: Date.now(),\n    };\n    await saveSong(song);\n    if (this.onSaved) this.onSaved(song.id);\n  }\n}\n","src/ui/tuner-view.js":"// Tuner + reference tones UI.\n\nimport { Tuner } from 'src/audio/tuner.js';\nimport { STRINGS, playTone, stopTone } from 'src/audio/reference.js';\n\nexport class TunerView {\n  constructor(rootEl) {\n    this.root = rootEl;\n    this.tuner = null;\n    this.active = false;\n\n    this.root.innerHTML = `\n      <div class=\"tuner\">\n        <button class=\"toggle primary\">Start Tuner</button>\n        <div class=\"note\">—<span class=\"octave\"></span></div>\n        <div class=\"cents-bar\">\n          <div class=\"center-line\"></div>\n          <div class=\"indicator\" style=\"left:50%\"></div>\n        </div>\n        <div class=\"cents-label\">0¢</div>\n        <p style=\"color:var(--fg-dim);font-size:13px;\">Or tap a string for reference tone:</p>\n      </div>\n      <div class=\"string-buttons\">\n        ${STRINGS.map(s => `<button data-freq=\"${s.freq}\" data-name=\"${s.name}\">${s.label}<br><small style=\"color:var(--fg-dim)\">${s.name}</small></button>`).join('')}\n      </div>\n    `;\n\n    this.noteEl = this.root.querySelector('.note');\n    this.octaveEl = this.root.querySelector('.octave');\n    this.indicatorEl = this.root.querySelector('.indicator');\n    this.centsLabelEl = this.root.querySelector('.cents-label');\n    this.toggleBtn = this.root.querySelector('.toggle');\n\n    this.toggleBtn.addEventListener('click', () => this.toggleTuner());\n\n    this.root.querySelectorAll('.string-buttons button').forEach(btn => {\n      btn.addEventListener('click', () => {\n        const freq = parseFloat(btn.dataset.freq);\n        playTone(freq, 3);\n      });\n    });\n  }\n\n  async toggleTuner() {\n    if (this.active) {\n      this.tuner?.stop();\n      this.tuner = null;\n      this.active = false;\n      this.toggleBtn.textContent = 'Start Tuner';\n      this.toggleBtn.classList.add('primary');\n      this.noteEl.firstChild.textContent = '—';\n      this.octaveEl.textContent = '';\n    } else {\n      this.tuner = new Tuner({ onPitch: (p) => this.updatePitch(p) });\n      try {\n        await this.tuner.start();\n        this.active = true;\n        this.toggleBtn.textContent = 'Stop';\n        this.toggleBtn.classList.remove('primary');\n      } catch (err) {\n        alert('Microphone access denied or unavailable.');\n        this.tuner = null;\n      }\n    }\n  }\n\n  updatePitch({ note, octave, cents }) {\n    this.noteEl.firstChild.textContent = note;\n    this.octaveEl.textContent = octave;\n    const pct = 50 + (cents / 50) * 50;\n    this.indicatorEl.style.left = `${Math.max(0, Math.min(100, pct))}%`;\n    this.indicatorEl.classList.toggle('in-tune', Math.abs(cents) < 5);\n    this.centsLabelEl.textContent = `${cents > 0 ? '+' : ''}${cents}¢`;\n  }\n\n  hide() {\n    if (this.active) this.toggleTuner();\n    stopTone();\n  }\n}\n","src/ui/metronome-view.js":"// Standalone metronome screen.\n\nimport { Metronome } from 'src/audio/metronome.js';\n\nexport class MetronomeView {\n  constructor(rootEl) {\n    this.root = rootEl;\n    this.met = new Metronome();\n    this.bpm = 100;\n    this.bpb = 4;\n\n    this.root.innerHTML = `\n      <div class=\"metronome\">\n        <div class=\"bpm-display\">100</div>\n        <div class=\"beats\"></div>\n        <div class=\"controls\">\n          <button class=\"play-btn primary\">Start</button>\n          <div class=\"row\">\n            <label>BPM</label>\n            <input type=\"range\" min=\"40\" max=\"240\" value=\"100\" class=\"bpm-slider\" />\n            <span class=\"bpm-val value\">100</span>\n          </div>\n          <div class=\"row\">\n            <label>Beats/bar</label>\n            <input type=\"range\" min=\"1\" max=\"8\" value=\"4\" class=\"bpb-slider\" />\n            <span class=\"bpb-val value\">4</span>\n          </div>\n          <button class=\"tap-btn\">TAP TEMPO</button>\n        </div>\n      </div>\n    `;\n\n    this.displayEl = this.root.querySelector('.bpm-display');\n    this.beatsEl = this.root.querySelector('.beats');\n    this.bpmSlider = this.root.querySelector('.bpm-slider');\n    this.bpbSlider = this.root.querySelector('.bpb-slider');\n    this.bpmVal = this.root.querySelector('.bpm-val');\n    this.bpbVal = this.root.querySelector('.bpb-val');\n    this.playBtn = this.root.querySelector('.play-btn');\n\n    this.met.onBeat = (idx) => this.flashBeat(idx);\n\n    this.renderBeats();\n\n    this.bpmSlider.addEventListener('input', () => this.setBpm(+this.bpmSlider.value));\n    this.bpbSlider.addEventListener('input', () => this.setBpb(+this.bpbSlider.value));\n    this.playBtn.addEventListener('click', () => this.toggle());\n    this.root.querySelector('.tap-btn').addEventListener('click', () => this.tap());\n  }\n\n  setBpm(v) {\n    this.bpm = v;\n    this.met.setBpm(v);\n    this.displayEl.textContent = v;\n    this.bpmVal.textContent = v;\n    this.bpmSlider.value = v;\n  }\n\n  setBpb(v) {\n    this.bpb = v;\n    this.met.setBeatsPerBar(v);\n    this.bpbVal.textContent = v;\n    this.renderBeats();\n  }\n\n  renderBeats() {\n    this.beatsEl.innerHTML = '';\n    for (let i = 0; i < this.bpb; i++) {\n      const d = document.createElement('div');\n      d.className = 'beat' + (i === 0 ? ' downbeat' : '');\n      this.beatsEl.appendChild(d);\n    }\n  }\n\n  flashBeat(idx) {\n    const beats = this.beatsEl.children;\n    for (const b of beats) b.classList.remove('active');\n    if (beats[idx]) {\n      beats[idx].classList.add('active');\n      setTimeout(() => beats[idx]?.classList.remove('active'), 100);\n    }\n  }\n\n  toggle() {\n    if (this.met.running) {\n      this.met.stop();\n      this.playBtn.textContent = 'Start';\n      this.playBtn.classList.add('primary');\n    } else {\n      this.met.start();\n      this.playBtn.textContent = 'Stop';\n      this.playBtn.classList.remove('primary');\n    }\n  }\n\n  tap() {\n    const now = performance.now();\n    if (!this._taps) this._taps = [];\n    this._taps.push(now);\n    if (this._taps.length > 6) this._taps.shift();\n    if (this._taps.length < 2) return;\n    let sum = 0;\n    for (let i = 1; i < this._taps.length; i++) sum += this._taps[i] - this._taps[i - 1];\n    const avg = sum / (this._taps.length - 1);\n    if (avg > 2000) { this._taps = [now]; return; }\n    this.setBpm(Math.round(60000 / avg));\n  }\n\n  hide() { if (this.met.running) this.toggle(); }\n}\n","src/ui/settings.js":"// Settings screen: theme, default BPM, export/import library.\n\nimport { getAllSongs, saveSong, getSetting, setSetting } from 'src/db.js';\n\nexport class SettingsView {\n  constructor(rootEl) {\n    this.root = rootEl;\n    this.root.innerHTML = `\n      <div class=\"settings\">\n        <div class=\"group\">\n          <h3>About</h3>\n          <p style=\"color:var(--fg-dim);font-size:13px;\">Guitar Practice v1 — offline-first PWA. All data stored on this device.</p>\n        </div>\n        <div class=\"group\">\n          <h3>Library</h3>\n          <div class=\"row\">\n            <span>Songs in library</span>\n            <span class=\"count value\">0</span>\n          </div>\n          <div style=\"display:flex;gap:8px;padding-top:8px;\">\n            <button class=\"export-btn\">Export JSON</button>\n            <button class=\"import-btn\">Import JSON</button>\n            <input type=\"file\" accept=\".json,application/json\" class=\"import-file\" style=\"display:none\" />\n          </div>\n        </div>\n        <div class=\"group\">\n          <h3>Display</h3>\n          <div class=\"row\">\n            <span>Theme</span>\n            <select class=\"theme-select\">\n              <option value=\"auto\">Auto (system)</option>\n              <option value=\"dark\">Dark</option>\n              <option value=\"light\">Light</option>\n            </select>\n          </div>\n        </div>\n      </div>\n    `;\n\n    this.countEl = this.root.querySelector('.count');\n    this.themeSelect = this.root.querySelector('.theme-select');\n    this.importFile = this.root.querySelector('.import-file');\n\n    this.root.querySelector('.export-btn').addEventListener('click', () => this.exportLibrary());\n    this.root.querySelector('.import-btn').addEventListener('click', () => this.importFile.click());\n    this.importFile.addEventListener('change', (e) => this.importLibrary(e.target.files[0]));\n    this.themeSelect.addEventListener('change', () => this.applyTheme(this.themeSelect.value));\n\n    this.init();\n  }\n\n  async init() {\n    const theme = await getSetting('theme', 'auto');\n    this.themeSelect.value = theme;\n    this.applyTheme(theme, false);\n    this.refresh();\n  }\n\n  async refresh() {\n    const songs = await getAllSongs();\n    this.countEl.textContent = songs.length;\n  }\n\n  async applyTheme(theme, save = true) {\n    const root = document.documentElement;\n    root.dataset.theme = theme;\n    if (theme === 'dark') root.style.colorScheme = 'dark';\n    else if (theme === 'light') root.style.colorScheme = 'light';\n    else root.style.colorScheme = '';\n    if (save) await setSetting('theme', theme);\n  }\n\n  async exportLibrary() {\n    const songs = await getAllSongs();\n    const blob = new Blob([JSON.stringify(songs, null, 2)], { type: 'application/json' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = `guitar-practice-library-${new Date().toISOString().slice(0, 10)}.json`;\n    a.click();\n    URL.revokeObjectURL(url);\n  }\n\n  async importLibrary(file) {\n    if (!file) return;\n    const text = await file.text();\n    let songs;\n    try { songs = JSON.parse(text); } catch { alert('Invalid JSON file.'); return; }\n    if (!Array.isArray(songs)) { alert('JSON must be an array of songs.'); return; }\n    let count = 0;\n    for (const s of songs) {\n      if (s.id && s.source) { await saveSong(s); count++; }\n    }\n    alert(`Imported ${count} songs.`);\n    this.refresh();\n  }\n}\n","src/app.js":"// Bootstrap: screen router, service worker registration, share-target handling.\n\nimport { seedIfEmpty } from 'src/db.js';\nimport { SEED_SONGS } from 'src/songs-seed.js';\nimport { SongListView } from 'src/ui/song-list.js';\nimport { SongPlayerView } from 'src/ui/song-player.js';\nimport { SongEditView } from 'src/ui/song-edit.js';\nimport { TunerView } from 'src/ui/tuner-view.js';\nimport { MetronomeView } from 'src/ui/metronome-view.js';\nimport { SettingsView } from 'src/ui/settings.js';\n\nconst screens = {};\nconst tabs = {};\nlet activeScreen = 'songs';\nlet topbarTitle, topbarBack, topbarAdd;\n\nasync function init() {\n  topbarTitle = document.querySelector('.topbar h1');\n  topbarBack = document.querySelector('.topbar .back-btn');\n  topbarAdd = document.querySelector('.topbar .add-btn');\n\n  topbarBack.addEventListener('click', () => switchTo('songs'));\n  topbarAdd.addEventListener('click', () => {\n    screens.edit.reset();\n    switchTo('edit');\n  });\n\n  screens.songs = new SongListView(document.getElementById('screen-songs'), {\n    onOpen: (id) => openSong(id),\n  });\n  screens.player = new SongPlayerView(document.getElementById('screen-player'), {\n    onBack: () => switchTo('songs'),\n  });\n  screens.edit = new SongEditView(document.getElementById('screen-edit'), {\n    onSaved: () => { screens.songs.refresh(); switchTo('songs'); },\n    onCancel: () => switchTo('songs'),\n  });\n  screens.tuner = new TunerView(document.getElementById('screen-tuner'));\n  screens.metronome = new MetronomeView(document.getElementById('screen-metronome'));\n  screens.settings = new SettingsView(document.getElementById('screen-settings'));\n\n  document.querySelectorAll('.tabbar button').forEach(btn => {\n    tabs[btn.dataset.tab] = btn;\n    btn.addEventListener('click', () => switchTo(btn.dataset.tab));\n  });\n\n  await seedIfEmpty(SEED_SONGS);\n  await screens.songs.refresh();\n\n  // Share Target handling\n  const params = new URLSearchParams(location.search);\n  const shared = params.get('text') || params.get('title') || params.get('url');\n  if (shared) {\n    screens.edit.reset(shared);\n    switchTo('edit');\n    history.replaceState({}, '', location.pathname);\n  }\n\n  // Service worker\n  if ('serviceWorker' in navigator) {\n    navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW register failed', err));\n  }\n\n  switchTo(activeScreen);\n}\n\nfunction switchTo(name) {\n  // Hide player if leaving it\n  if (activeScreen === 'player' && name !== 'player') screens.player.hide();\n  if (activeScreen === 'tuner' && name !== 'tuner') screens.tuner.hide();\n  if (activeScreen === 'metronome' && name !== 'metronome') screens.metronome.hide();\n\n  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));\n  const screenEl = document.getElementById(`screen-${name}`);\n  if (screenEl) screenEl.classList.add('active');\n  if (name === 'player') screens.player.show();\n\n  Object.values(tabs).forEach(b => b.classList.remove('active'));\n  if (tabs[name]) tabs[name].classList.add('active');\n\n  // Topbar\n  const titles = {\n    songs: 'Songs', player: '', edit: 'Edit Song',\n    tuner: 'Tuner', metronome: 'Metronome', settings: 'Settings',\n  };\n  topbarTitle.textContent = titles[name] || '';\n  topbarBack.classList.toggle('hidden', !['player', 'edit'].includes(name));\n  topbarAdd.classList.toggle('hidden', name !== 'songs');\n\n  // Refresh data on entry\n  if (name === 'songs') screens.songs.refresh();\n  if (name === 'settings') screens.settings.refresh();\n\n  activeScreen = name;\n}\n\nasync function openSong(id) {\n  await screens.player.load(id);\n  switchTo('player');\n}\n\ndocument.addEventListener('DOMContentLoaded', init);\n"};
